<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Sin conexión</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:#111827;

color:white;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

padding:30px;

}

.card{

max-width:420px;

width:100%;

background:#1f2937;

padding:40px;

border-radius:24px;

text-align:center;

box-shadow:
0 25px 60px rgba(0,0,0,.35);

}

.logo{

font-size:64px;

margin-bottom:20px;

}

h1{

font-size:30px;

margin-bottom:14px;

}

p{

color:#d1d5db;

line-height:1.6;

margin-bottom:28px;

}

button{

background:#f97316;

color:white;

border:none;

padding:14px 28px;

border-radius:14px;

font-size:16px;

cursor:pointer;

transition:.25s;

}

button:hover{

opacity:.92;

}

</style>

</head>

<body>

<div class="card">

<div class="logo">
📶
</div>

<h1>
Sin conexión
</h1>

<p>

No fue posible conectarse a Internet.

Verifica tu conexión e intenta nuevamente.

</p>

<button
onclick="location.reload()"
>

Reintentar

</button>

</div>

</body>

</html>
